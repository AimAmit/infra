apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/AimAmit/infra.git
    targetRevision: HEAD
    path: bootstrap/apps
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
