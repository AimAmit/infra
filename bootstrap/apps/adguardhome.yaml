apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguardhome
  namespace: argocd
spec:
  project: default
  destination:
    namespace: adguard
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/AimAmit/infra.git
    targetRevision: HEAD
    path: cluster/adguard/kustomize
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
