apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpn-proxy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AimAmit/infra.git
    targetRevision: HEAD
    path: cluster/vpn-proxy
  destination:
    server: https://kubernetes.default.svc
    namespace: vpn-proxy
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
