apiVersion: apps/v1
kind: Deployment
metadata:
  name: bgutil-pot
  namespace: yt-dlp
  labels:
    app: bgutil-pot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bgutil-pot
  template:
    metadata:
      labels:
        app: bgutil-pot
    spec:
      containers:
      - name: bgutil-pot
        image: brainicism/bgutil-ytdlp-pot-provider:latest
        env:
        - name: HTTP_PROXY
          value: "http://127.0.0.1:8118"
        - name: HTTPS_PROXY
          value: "http://127.0.0.1:8118"
        - name: NO_PROXY
          value: "localhost,127.0.0.1"
        ports:
        - containerPort: 4416
        resources:
          limits:
            memory: 128Mi
            cpu: 200m
          requests:
            memory: 64Mi
            cpu: 100m
        readinessProbe:
          tcpSocket:
            port: 4416
          initialDelaySeconds: 5
          periodSeconds: 10
      - name: warp
        image: monius/docker-warp-socks:latest
        ports:
        - containerPort: 9091
      - name: privoxy
        image: alpine:3.18
        command: ["sh", "-c", "apk add --no-cache privoxy && privoxy --no-daemon /etc/privoxy/custom.conf"]
        ports:
        - containerPort: 8118
        volumeMounts:
        - name: privoxy-config-vol
          mountPath: /etc/privoxy/custom.conf
          subPath: custom.conf
      volumes:
      - name: privoxy-config-vol
        configMap:
          name: privoxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: bgutil-pot-svc
  namespace: yt-dlp
spec:
  selector:
    app: bgutil-pot
  ports:
    - port: 4416
      targetPort: 4416
  type: ClusterIP
