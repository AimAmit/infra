apiVersion: apps/v1
kind: Deployment
metadata:
  name: bgutil-pot
  namespace: yt-dlp
  labels:
    app: bgutil-pot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bgutil-pot
  template:
    metadata:
      labels:
        app: bgutil-pot
    spec:
      containers:
      - name: bgutil-pot
        image: brainicism/bgutil-ytdlp-pot-provider:latest
        ports:
        - containerPort: 4416
        resources:
          limits:
            memory: 128Mi
            cpu: 200m
          requests:
            memory: 64Mi
            cpu: 100m
        readinessProbe:
          tcpSocket:
            port: 4416
          initialDelaySeconds: 5
          periodSeconds: 10
      - name: tor
        image: alpine:3.18
        command: ["sh", "-c", "apk add tor && echo -e 'SocksPort 0.0.0.0:9050\\nMaxCircuitDirtiness 10' > /etc/tor/torrc && tor -f /etc/tor/torrc"]
        ports:
        - containerPort: 9050
      - name: privoxy
        image: alpine:3.18
        command: ["sh", "-c", "apk add privoxy && echo -e 'listen-address 0.0.0.0:8118\\nforward-socks5t / 127.0.0.1:9050 .' > /custom.conf && privoxy --no-daemon /custom.conf"]
        ports:
        - containerPort: 8118
---
apiVersion: v1
kind: Service
metadata:
  name: bgutil-pot-svc
  namespace: yt-dlp
spec:
  selector:
    app: bgutil-pot
  ports:
    - port: 4416
      targetPort: 4416
  type: ClusterIP
