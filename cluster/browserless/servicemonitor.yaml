apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: browserless
  namespace: browserless
  labels:
    app: browserless
    # The default kube-prometheus-stack selects ServiceMonitors by release label if configured,
    # or selects all if serviceMonitorSelectorNilUsesHelmValues is false.
    # Often, it just selects all ServiceMonitors in all namespaces.
spec:
  selector:
    matchLabels:
      app: browserless
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
