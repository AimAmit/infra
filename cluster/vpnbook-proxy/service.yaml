apiVersion: v1
kind: Service
metadata:
  name: vpnbook-proxy-svc
  namespace: vpnbook-proxy
  annotations:
    # Tailscale operator publishes this Service to the tailnet as MagicDNS
    # name "vpnbook-proxy". Reachable only from your tailnet, never public.
    tailscale.com/expose: "true"
    tailscale.com/hostname: "vpnbook-proxy"
spec:
  selector:
    app: vpnbook-proxy
  ports:
    - name: http-proxy
      port: 8888
      targetPort: 8888
