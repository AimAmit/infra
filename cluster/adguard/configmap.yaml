apiVersion: v1
kind: ConfigMap
metadata:
  name: adguard-config
  namespace: adguard
data:
  AdGuardHome.yaml: |
    # Paste your actual AdGuardHome.yaml configuration here!
    # You can retrieve it from your old /opt/local-path-provisioner/pvc-... (conf) folder
    bind_host: 0.0.0.0
    bind_port: 3000
    dns:
      bind_hosts:
      - 0.0.0.0
      port: 53
