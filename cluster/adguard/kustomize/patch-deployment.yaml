apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguardhome
spec:
  template:
    spec:
      initContainers:
      - name: copy-config
        image: alpine:latest
        command:
        - /bin/sh
        - -c
        - |
          cp /etc/adguard-config/AdGuardHome.yaml /opt/adguardhome/conf/AdGuardHome.yaml
        volumeMounts:
        - name: conf-ro
          mountPath: /etc/adguard-config
        - name: conf
          mountPath: /opt/adguardhome/conf
      containers:
      - name: adguardhome
        volumeMounts:
        - name: certs
          mountPath: /opt/adguardhome/ssl
          readOnly: true
      volumes:
      - name: conf-ro
        configMap:
          name: adguardhome-config
      - name: certs
        secret:
          secretName: 0xamit-com-tls
