apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: default
  destination:
    namespace: redis
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: redis
      targetRevision: 21.1.3
      helm:
        valueFiles:
          - $values/cluster/redis/values.yaml
    - repoURL: https://github.com/AimAmit/infra.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/AimAmit/infra.git
      targetRevision: HEAD
      path: cluster/redis/storage
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
