apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes
data:
  config.yaml: |
    llm:
      provider: openai
      model: openai/gpt-5
      base_url: "https://gateway.ai.cloudflare.com/v1/62bfe73a8df61fcc43c79c8be3a1747b/my-gateway/compat"
    telegram:
      enabled: true
      dmPolicy: pairing
      groupPolicy: allowlist
      streamMode: partial
    terminal:
      backend: ssh
      ssh_host: mac-ssh
      ssh_port: 22
      ssh_user: tnluser
