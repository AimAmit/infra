apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes
data:
  config.yaml: |
    model:
      provider: gemini
      base_url: https://generativelanguage.googleapis.com/v1beta
      model: gemini-3.5-flash
    telegram:
      enabled: true
      dmPolicy: pairing
      groupPolicy: allowlist
      streamMode: partial
    terminal:
      backend: ssh
      ssh_host: mac-ssh
      ssh_port: 22
      ssh_user: tnluser
