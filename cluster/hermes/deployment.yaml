apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      initContainers:
      - name: init-config
        image: alpine:latest
        command: ['sh', '-c', 'cp /tmp/config.yaml /opt/data/config.yaml']
        volumeMounts:
        - name: config-volume
          mountPath: /tmp/config.yaml
          subPath: config.yaml
        - name: data-volume
          mountPath: /opt/data
      containers:
      - name: hermes
        image: nousresearch/hermes-agent:latest
        command: ["sh", "-c"]
        args:
          - >
            sed -i 's/    if ws_url:/    if "0.0.0.0" in ws_url or "127.0.0.1" in ws_url:\n        import urllib.parse\n        raw_parsed = urllib.parse.urlparse(raw if ":\/\/" in raw else "http:\/\/" + raw)\n        ws_url = urllib.parse.urlparse(ws_url)._replace(netloc=raw_parsed.netloc).geturl()\n    if ws_url:/' /opt/hermes/tools/browser_tool.py &&
            exec hermes gateway run
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: cf-aig-token
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: telegram-token
        volumeMounts:
        - name: data-volume
          mountPath: /opt/data
      - name: dashboard
        image: nousresearch/hermes-agent:latest
        command: ["sh", "-c"]
        args:
          - >
            sed -i 's/    if ws_url:/    if "0.0.0.0" in ws_url or "127.0.0.1" in ws_url:\n        import urllib.parse\n        raw_parsed = urllib.parse.urlparse(raw if ":\/\/" in raw else "http:\/\/" + raw)\n        ws_url = urllib.parse.urlparse(ws_url)._replace(netloc=raw_parsed.netloc).geturl()\n    if ws_url:/' /opt/hermes/tools/browser_tool.py &&
            exec hermes dashboard
        env:
        - name: GATEWAY_HEALTH_URL
          value: "http://localhost:8642"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: cf-aig-token
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: telegram-token
        volumeMounts:
        - name: data-volume
          mountPath: /opt/data
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: hermes-data
      - name: config-volume
        configMap:
          name: hermes-config
