apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      initContainers:
      - name: init-config
        image: alpine:latest
        command:
        - sh
        - -c
        - |
          cp /tmp/config.yaml /opt/data/config.yaml
          mkdir -p /opt/hermes/ssh
          cp /tmp/ssh/id_ed25519 /opt/hermes/ssh/id_ed25519
          chown 10000:10000 /opt/hermes/ssh/id_ed25519
          chmod 400 /opt/hermes/ssh/id_ed25519
        volumeMounts:
        - name: config-volume
          mountPath: /tmp/config.yaml
          subPath: config.yaml
        - name: data-volume
          mountPath: /opt/data
        - name: ssh-key-secret
          mountPath: /tmp/ssh
        - name: ssh-dir
          mountPath: /opt/hermes/ssh
      containers:
      - name: hermes
        image: nousresearch/hermes-agent:latest
        command: ["hermes", "gateway", "run"]
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: cf-aig-token
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: telegram-token
        volumeMounts:
        - name: data-volume
          mountPath: /opt/data
        - name: ssh-dir
          mountPath: /opt/hermes/ssh
      - name: dashboard
        image: nousresearch/hermes-agent:latest
        command: ["hermes", "dashboard"]
        env:
        - name: GATEWAY_HEALTH_URL
          value: "http://localhost:8642"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: cf-aig-token
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: telegram-token
        volumeMounts:
        - name: data-volume
          mountPath: /opt/data
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: hermes-data
      - name: config-volume
        configMap:
          name: hermes-config
      - name: ssh-key-secret
        secret:
          secretName: hermes-ssh-key
          defaultMode: 256
      - name: ssh-dir
        emptyDir: {}
