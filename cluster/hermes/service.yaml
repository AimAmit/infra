apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: hermes
  annotations:
    tailscale.com/hostname: "hermes"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: hermes
  ports:
    - name: dashboard
      port: 80
      targetPort: 9120
    - name: gateway
      port: 8642
      targetPort: 8642
