apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-proxy
  namespace: vpn-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpn-proxy
  template:
    metadata:
      labels:
        app: vpn-proxy
    spec:
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.40.0
          ports:
            - name: http-proxy
              containerPort: 8888
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            # --- Custom WireGuard (Proton VPN US-FREE#66 exit) ---
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: VPN_TYPE
              value: "wireguard"
            # PrivateKey comes from the manually-created Secret (never in git)
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: proton-wg
                  key: WIREGUARD_PRIVATE_KEY
            # Peer PublicKey / endpoint / address are not sensitive
            - name: WIREGUARD_PUBLIC_KEY
              value: "Uqp1/VJ/Lz2VoN/2D0HEG7G8WDxLJm7+JNC5KZrUREw="
            - name: WIREGUARD_ADDRESSES
              value: "10.2.0.2/32"
            - name: VPN_ENDPOINT_IP
              value: "149.88.30.88"
            - name: VPN_ENDPOINT_PORT
              value: "51820"
            # Lower MTU: pod traffic is already encapsulated by the CNI, so the
            # default WireGuard MTU fragments large TLS packets (they silently
            # drop while small packets pass). 1320 leaves headroom.
            - name: WIREGUARD_MTU
              value: "1320"
            # Plaintext DNS instead of DNS-over-TLS — DoT's TCP/TLS handshake
            # is the first casualty of MTU issues and trips the healthcheck.
            - name: DOT
              value: "off"
            # Don't restart the tunnel on the first blip while it settles.
            - name: HEALTH_VPN_DURATION_INITIAL
              value: "30s"
            # --- Built-in HTTP proxy ---
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_LISTENING_ADDRESS
              value: ":8888"
            # Open the proxy port through the killswitch for external clients
            # (in-cluster pods + tailnet). Without this only loopback reaches it.
            - name: FIREWALL_INPUT_PORTS
              value: "8888"
            # --- Killswitch: allow replies to LOCAL cluster clients only; all
            # public traffic still forced through the VPN. Calico pods
            # 192.168.0.0/16, services 10.96.0.0/12, nodes 10.0.0.0/16.
            # Tailnet clients reach us via the operator proxy pod (a 192.168.x
            # pod), so the pod CIDR already covers local-over-tailscale too.
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "192.168.0.0/16,10.96.0.0/12,10.0.0.0/16"
            - name: TZ
              value: "UTC"
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              memory: "128Mi"
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
