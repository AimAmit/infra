apiVersion: v1
kind: Service
metadata:
  name: vpn-proxy-svc
  namespace: vpn-proxy
  annotations:
    # Tailscale operator publishes this Service to the tailnet as MagicDNS
    # name "vpn-proxy". Reachable only from your tailnet, never public.
    tailscale.com/expose: "true"
    tailscale.com/hostname: "vpn-proxy"
spec:
  selector:
    app: vpn-proxy
  ports:
    - name: http-proxy
      port: 8888
      targetPort: 8888
