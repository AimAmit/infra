apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AimAmit/infra.git'
    path: cluster/prometheus-stack/dashboards
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prometheus-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
